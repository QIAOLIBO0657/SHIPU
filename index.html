<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>孕妈安心餐 - 健康点餐平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #fff5f7;
            color: #555;
            padding-bottom: 70px;
        }

        header {
            background-color: #ff9bbb;
            color: white;
            padding: 18px 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 2px 10px #ffd6e3;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 15px;
        }

        .section-title {
            font-size: 18px;
            margin: 15px 0;
            color: #ff7a9c;
            font-weight: bold;
            border-left: 5px solid #ff9bbb;
            padding-left: 10px;
        }

        .food-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .food-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px #ffd6e3;
        }

        .food-img {
            width: 100%;
            height: 110px;
            object-fit: cover;
        }

        .food-info {
            padding: 10px;
        }

        .food-name {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .food-desc {
            font-size: 12px;
            color: #999;
            margin-bottom: 6px;
        }

        .food-price {
            color: #ff5c8a;
            font-weight: bold;
            font-size: 16px;
        }

        .add-cart {
            background: #ff9bbb;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            margin-top: 6px;
            width: 100%;
            cursor: pointer;
        }

        .cart {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            padding: 15px 20px;
            box-shadow: 0 -2px 10px #ffd6e3;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-total {
            font-size: 18px;
            font-weight: bold;
            color: #ff5c8a;
        }

        .submit-order {
            background: #ff5c8a;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .order-box {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            display: none;
        }

        .order-box input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .send-order {
            width: 100%;
            background: #ff5c8a;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            margin-top: 10px;
            font-weight: bold;
        }

        .success {
            text-align: center;
            color: #4caf50;
            font-weight: bold;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

<header>🍼 孕妈安心餐 - 健康点餐</header>

<div class="container">
    <div class="section-title">今日推荐 · 清淡营养</div>
    <div class="food-list">
        <div class="food-item">
            <img src="https://picsum.photos/id/292/300/200" class="food-img">
            <div class="food-info">
                <div class="food-name">清炖鸡汤</div>
                <div class="food-desc">无盐 · 补气血</div>
                <div class="food-price">¥28</div>
                <button class="add-cart" data-name="清炖鸡汤" data-price="28">加入点餐</button>
            </div>
        </div>
        <div class="food-item">
            <img src="https://picsum.photos/id/431/300/200" class="food-img">
            <div class="food-info">
                <div class="food-name">清蒸鲈鱼</div>
                <div class="food-desc">高蛋白 · 易消化</div>
                <div class="food-price">¥32</div>
                <button class="add-cart" data-name="清蒸鲈鱼" data-price="32">加入点餐</button>
            </div>
        </div>
        <div class="food-item">
            <img src="https://picsum.photos/id/225/300/200" class="food-img">
            <div class="food-info">
                <div class="food-name">蔬菜小米粥</div>
                <div class="food-desc">养胃 · 清淡</div>
                <div class="food-price">¥12</div>
                <button class="add-cart" data-name="蔬菜小米粥" data-price="12">加入点餐</button>
            </div>
        </div>
        <div class="food-item">
            <img src="https://picsum.photos/id/488/300/200" class="food-img">
            <div class="food-info">
                <div class="food-name">山药排骨汤</div>
                <div class="food-desc">补钙 · 补营养</div>
                <div class="food-price">¥26</div>
                <button class="add-cart" data-name="山药排骨汤" data-price="26">加入点餐</button>
            </div>
        </div>
    </div>

    <div class="section-title">订单信息</div>
    <div class="order-box" id="orderBox">
        <input type="text" id="username" placeholder="孕妈姓名">
        <input type="text" id="phone" placeholder="联系电话">
        <input type="text" id="address" placeholder="送餐地址">
        <button class="send-order" id="sendOrder">提交订单</button>
    </div>

    <div class="success" id="success">✅ 订单提交成功！我们将尽快为您送餐</div>
</div>

<div class="cart">
    <div class="cart-total" id="total">合计：¥0</div>
    <button class="submit-order" id="submitBtn">去结算</button>
</div>

<script>
    let cart = []
    let total = 0
    const totalDom = document.getElementById('total')
    const orderBox = document.getElementById('orderBox')
    const success = document.getElementById('success')

    document.querySelectorAll('.add-cart').forEach(btn => {
        btn.onclick = () => {
            const name = btn.dataset.name
            const price = Number(btn.dataset.price)
            cart.push({ name, price })
            total += price
            totalDom.innerText = `合计：¥${total}`
        }
    })

    document.getElementById('submitBtn').onclick = () => {
        if (total === 0) {
            alert('请先选择餐品')
            return
        }
        orderBox.style.display = 'block'
    }

    document.getElementById('sendOrder').onclick = () => {
        const name = document.getElementById('username').value
        const phone = document.getElementById('phone').value
        const address = document.getElementById('address').value

        if (!name || !phone || !address) {
            alert('请填写完整信息')
            return
        }

        success.style.display = 'block'
        orderBox.style.display = 'none'
        cart = []
        total = 0
        totalDom.innerText = `合计：¥0`
    }
</script>

</body>
</html>
