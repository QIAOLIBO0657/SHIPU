<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>孕期营养食谱 - 周计划点餐版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f9f3f5;
            color: #333;
            padding-bottom: 70px;
        }

        /* 顶部导航栏 */
        .header {
            background-color: #f8bbd0;
            padding: 15px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 22px;
            color: #d81b60;
        }

        /* 分类筛选栏 */
        .category {
            display: flex;
            padding: 10px;
            gap: 8px;
            overflow-x: auto;
            background: white;
            margin: 10px 0;
        }

        .category button {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            background: #fce4ec;
            color: #d81b60;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.3s;
        }

        .category button.active {
            background: #d81b60;
            color: white;
        }

        /* 食谱列表 */
        .recipe-list {
            padding: 0 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        /* 食谱卡片 */
        .recipe-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: 0.3s;
        }

        .recipe-card:hover {
            transform: translateY(-3px);
        }

        .recipe-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #fce4ec;
        }

        .recipe-info {
            padding: 12px;
        }

        .recipe-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }

        .recipe-tag {
            display: inline-block;
            padding: 3px 8px;
            font-size: 12px;
            background: #f8bbd0;
            color: #d81b60;
            border-radius: 4px;
            margin-right: 5px;
        }

        /* 底部导航 */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            display: flex;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .tab-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #999;
            position: relative;
        }

        .tab-item.active {
            color: #d81b60;
        }

        .tab-item .badge {
            position: absolute;
            top: 5px;
            right: 20px;
            background: #ff4081;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 16px;
        }

        .tab-item i {
            font-size: 20px;
            display: block;
            margin-bottom: 2px;
        }

        .tab-item span {
            font-size: 12px;
        }

        /* 弹窗详情 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 15px;
            padding: 20px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .modal-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            background-color: #fce4ec;
        }

        .modal-title {
            font-size: 20px;
            color: #d81b60;
            margin-bottom: 10px;
        }

        .modal-desc {
            line-height: 1.6;
            margin: 10px 0;
        }

        .ingredients-list {
            background: #fce4ec;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .ingredients-list h4 {
            margin-bottom: 8px;
            color: #d81b60;
        }

        .ingredients-list ul {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .ingredients-list li {
            font-size: 14px;
        }

        /* 周计划选择器 */
        .plan-selector {
            background: #f8f8f8;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .plan-selector h4 {
            margin-bottom: 10px;
            color: #d81b60;
        }

        .day-selector, .meal-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .day-selector button, .meal-selector button {
            padding: 6px 12px;
            border: 1px solid #f8bbd0;
            border-radius: 15px;
            background: white;
            color: #d81b60;
            cursor: pointer;
            transition: 0.3s;
        }

        .day-selector button.active, .meal-selector button.active {
            background: #d81b60;
            color: white;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .collect-btn, .add-order-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .collect-btn {
            background: #fce4ec;
            color: #d81b60;
        }

        .add-order-btn {
            background: #d81b60;
            color: white;
        }

        /* 点单页面 */
        .order-page {
            display: none;
            padding: 15px;
        }

        .day-plan {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .day-title {
            font-size: 18px;
            font-weight: bold;
            color: #d81b60;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f8bbd0;
        }

        .meal-section {
            margin-bottom: 12px;
        }

        .meal-title {
            font-size: 15px;
            font-weight: bold;
            margin: 8px 0;
            color: #666;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            margin-left: 10px;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item-name {
            font-size: 14px;
        }

        .del-order {
            color: #ff4081;
            font-size: 12px;
            cursor: pointer;
        }

        .shopping-list {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }

        .shopping-list h3 {
            color: #d81b60;
            margin-bottom: 15px;
        }

        .shopping-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #f0f0f0;
        }

        .shopping-item:last-child {
            border-bottom: none;
        }

        .empty-tip {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        /* 我的页面 */
        .mine-page {
            display: none;
            padding: 15px;
        }

        .user-info {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #f8bbd0;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #d81b60;
        }

        .menu-list {
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        .menu-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        /* 图片加载失败处理 */
        img[src=""], img:not([src]) {
            opacity: 0;
        }

        .clear-all-btn {
            background: #ff4081;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
            margin-bottom: 15px;
            float: right;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <h1>孕期营养食谱大全</h1>
    </div>

    <!-- 食谱页面 -->
    <div class="recipe-page" id="recipePage">

            <button data-type="late">孕晚期</button>

            <button data-type="lunch">午餐</button>
            <button data-type="dinner">晚餐</button>
            <button data-type="snack">加餐</button>
        </div>

        <!-- 食谱列表 -->
        <div class="recipe-list" id="recipeList">
            <!-- 数据由JS自动渲染 -->
        </div>
    </div>

    <!-- 点单页面 -->
    <div class="order-page" id="orderPage">
        <button class="clear-all-btn" id="clearAllBtn">清空本周计划</button>
        <div id="weeklyPlan">
            <!-- 周计划数据由JS自动渲染 -->
        </div>
        <div class="shopping-list" id="shoppingList">
            <h3>📋 本周采购清单（自动汇总）</h3>
            <!-- 汇总的食材 -->
        </div>
    </div>

    <!-- 我的页面 -->
    <div class="mine-page" id="minePage">
        <div class="user-info">
            <div class="user-avatar">👩</div>
            <h3>孕妈用户</h3>
            <p>科学饮食，健康孕期</p>
        </div>
        <div class="menu-list">
            <div class="menu-item">
                <span>我的收藏</span>
                <span>></span>
            </div>
            <div class="menu-item">
                <span>历史记录</span>
                <span>></span>
            </div>
            <div class="menu-item">
                <span>关于我们</span>
                <span>></span>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal" id="recipeModal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <img class="modal-image" id="modalImage" src="" alt="食谱图片" loading="lazy">
            <h2 class="modal-title" id="modalTitle"></h2>
            <p><strong>适合孕期：</strong><span id="modalType"></span> | <strong>推荐餐次：</strong><span id="modalMeal"></span></p>
            
            <div class="ingredients-list">
                <h4>🥬 所需食材</h4>
                <ul id="modalIngredients"></ul>
            </div>

            <p class="modal-desc" id="modalDesc"></p>

            <!-- 周计划选择器 -->
            <div class="plan-selector">
                <h4>📅 添加到周计划</h4>
                <div class="day-selector" id="daySelector">
                    <button data-day="1" class="active">周一</button>
                    <button data-day="2">周二</button>
                    <button data-day="3">周三</button>
                    <button data-day="4">周四</button>
                    <button data-day="5">周五</button>
                </div>
                <div class="meal-selector" id="mealSelector">
                    <button data-meal="breakfast" class="active">早餐</button>
                    <button data-meal="lunch">午餐</button>
                    <button data-meal="dinner">晚餐</button>
                    <button data-meal="snack">加餐</button>
                </div>
            </div>

            <div class="modal-btns">
                <button class="collect-btn" id="collectBtn">收藏食谱</button>
                <button class="add-order-btn" id="addOrderBtn">添加到计划</button>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->

            <span>食谱</span>
        </div>
        <div class="tab-item" data-page="order">
            <i>📅</i>
            <span>周计划</span>
            <span class="badge" id="orderBadge" style="display: none;">0</span>
        </div>
        <div class="tab-item" data-page="mine">
            <i>👤</i>
            <span>我的</span>

        let currentRecipe = null;
        let selectedDay = 1;
        let selectedMeal = "breakfast";
        let collectList = JSON.parse(localStorage.getItem('pregnancyCollect')) || [];
        let weeklyPlanData = JSON.parse(localStorage.getItem('pregnancyWeeklyPlan')) || {
            1: {breakfast: [], lunch: [], dinner: [], snack: []},
            2: {breakfast: [], lunch: [], dinner: [], snack: []},

            5: {breakfast: [], lunch: [], dinner: [], snack: []}
        };

        // 初始化
        function init() {
            renderRecipes();
            updateOrderBadge();
            renderWeeklyPlan();
            initSelectors();
        }

        // 初始化选择器
        function initSelectors() {
            // 日期选择
            daySelector.querySelectorAll('button').forEach(btn => {
                btn.onclick = () => {
                    daySelector.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedDay = parseInt(btn.dataset.day);
                };
            });

            // 餐次选择
            mealSelector.querySelectorAll('button').forEach(btn => {
                btn.onclick = () => {
                    mealSelector.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedMeal = btn.dataset.meal;
                };
            });
        }

        // 渲染食谱列表
        function renderRecipes(type = 'all') {
            recipeList.innerHTML = '';
            const filterData = type === 'all' 
                ? recipeData 
                : recipeData.filter(item => item.type === type || item.meal === type);
            
            filterData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.innerHTML = `
                    <img src="${item.image}" alt="${item.title}" class="recipe-image" loading="lazy" onerror="this.style.display='none'; this.parentElement.querySelector('.img-placeholder').style.display='flex';">
                    <div class="img-placeholder" style="display: none; width: 100%; height: 180px; background: #fce4ec; align-items: center; justify-content: center; color: #d81b60; font-size: 40px;">🍽️</div>
                    <div class="recipe-info">
                        <div class="recipe-title">${item.title}</div>
                        <span class="recipe-tag">${item.typeName}</span>
                        <span class="recipe-tag">${item.tag}</span>
                    </div>
                `;
                card.onclick = () => openModal(item);
                recipeList.appendChild(card);
            });
        }

        // 打开详情弹窗
        function openModal(recipe) {
            currentRecipe = recipe;
            const modalImage = document.getElementById('modalImage');
            modalImage.src = recipe.image;
            modalImage.onerror = function() {
                this.style.display = 'none';
                this.parentElement.querySelector('.modal-placeholder').style.display = 'flex';
            };
            
            document.getElementById('modalTitle').innerText = recipe.title;
            document.getElementById('modalType').innerText = recipe.typeName;
            document.getElementById('modalMeal').innerText = recipe.mealName;
            document.getElementById('modalDesc').innerText = recipe.desc;
            
            // 渲染食材
            const ingredientsUl = document.getElementById('modalIngredients');
            ingredientsUl.innerHTML = '';
            recipe.ingredients.forEach(ing => {
                const li = document.createElement('li');
                li.innerText = `${ing.name} ${ing.amount}`;
                ingredientsUl.appendChild(li);
            });

            collectBtn.innerText = collectList.includes(recipe.id) ? '已收藏' : '收藏食谱';
            modal.style.display = 'flex';
        }

        // 关闭弹窗
        closeBtn.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => e.target === modal && (modal.style.display = 'none');

        // 收藏功能
        collectBtn.onclick = () => {
            const id = currentRecipe.id;
            if(collectList.includes(id)) {
                collectList = collectList.filter(item => item !== id);
                collectBtn.innerText = '收藏食谱';
                alert('已取消收藏');
            } else {
                collectList.push(id);
                collectBtn.innerText = '已收藏';
                alert('收藏成功');
            }
            localStorage.setItem('pregnancyCollect', JSON.stringify(collectList));
        };

        // 添加到周计划
        addOrderBtn.onclick = () => {
            // 检查是否已经添加过
            const alreadyAdded = weeklyPlanData[selectedDay][selectedMeal].some(item => item.id === currentRecipe.id);
            if(alreadyAdded) {
                alert(`这道菜已经添加到${days[selectedDay-1]}${mealNames[selectedMeal]}啦~`);
                return;
            }

            // 添加到计划
            weeklyPlanData[selectedDay][selectedMeal].push(currentRecipe);
            localStorage.setItem('pregnancyWeeklyPlan', JSON.stringify(weeklyPlanData));
            
            updateOrderBadge();
            renderWeeklyPlan();
            alert(`已成功添加到${days[selectedDay-1]}${mealNames[selectedMeal]}！`);
            modal.style.display = 'none';
        };

        // 更新点单角标
        function updateOrderBadge() {
            let total = 0;
            for(let day in weeklyPlanData) {
                for(let meal in weeklyPlanData[day]) {
                    total += weeklyPlanData[day][meal].length;
                }
            }
            
            if(total > 0) {
                orderBadge.style.display = 'block';
                orderBadge.innerText = total;
            } else {
                orderBadge.style.display = 'none';
            }
        }

        // 渲染周计划页面
        function renderWeeklyPlan() {
            weeklyPlan.innerHTML = '';
            let hasContent = false;

            // 遍历每一天
            for(let day = 1; day <= 5; day++) {
                const dayData = weeklyPlanData[day];
                const dayHasContent = meals.some(meal => dayData[meal].length > 0);
                
                if(!dayHasContent) continue;
                hasContent = true;

                const dayDiv = document.createElement('div');
                dayDiv.className = 'day-plan';
                dayDiv.innerHTML = `<div class="day-title">📅 ${days[day-1]}</div>`;

                // 遍历每一餐
                meals.forEach(meal => {
                    const mealData = dayData[meal];
                    if(mealData.length === 0) return;

                    const mealDiv = document.createElement('div');
                    mealDiv.className = 'meal-section';
                    mealDiv.innerHTML = `<div class="meal-title">🍽️ ${mealNames[meal]}</div>`;

                    // 渲染该餐的食谱
                    mealData.forEach(item => {
                        const orderItem = document.createElement('div');
                        orderItem.className = 'order-item';
                        orderItem.innerHTML = `
                            <span class="order-item-name">${item.title}</span>
                            <span class="del-order" data-day="${day}" data-meal="${meal}" data-id="${item.id}">删除</span>
                        `;
                        mealDiv.appendChild(orderItem);
                    });

                    dayDiv.appendChild(mealDiv);
                });

                weeklyPlan.appendChild(dayDiv);
            }

            if(!hasContent) {
                weeklyPlan.innerHTML = '<div class="empty-tip">还没有制定本周计划哦~快去选择想吃的食谱吧！</div>';
            }

            // 绑定删除事件
            document.querySelectorAll('.del-order').forEach(btn => {
                btn.onclick = (e) => {
                    const day = parseInt(e.target.dataset.day);
                    const meal = e.target.dataset.meal;
                    const id = parseInt(e.target.dataset.id);
                    
                    weeklyPlanData[day][meal] = weeklyPlanData[day][meal].filter(item => item.id !== id);
                    localStorage.setItem('pregnancyWeeklyPlan', JSON.stringify(weeklyPlanData));
                    
                    updateOrderBadge();
                    renderWeeklyPlan();
                };
            });

            // 渲染采购清单
            renderShoppingList();
        }

        // 渲染采购清单
        function renderShoppingList() {
            shoppingList.innerHTML = '<h3>📋 本周采购清单（自动汇总）</h3>';
            
            // 汇总所有食材
            const ingredientsMap = {};
            for(let day in weeklyPlanData) {
                for(let meal in weeklyPlanData[day]) {
                    weeklyPlanData[day][meal].forEach(recipe => {
                        recipe.ingredients.forEach(ing => {
                            if(ingredientsMap[ing.name]) {
                                ingredientsMap[ing.name].push(ing.amount);
                            } else {
                                ingredientsMap[ing.name] = [ing.amount];
                            }
                        });
                    });
                }
            }

            // 检查是否有食材
            if(Object.keys(ingredientsMap).length === 0) {
                shoppingList.innerHTML += '<div class="empty-tip">添加食谱后，这里会自动汇总需要采购的食材~</div>';
                return;
            }

            // 渲染食材列表
            for(let name in ingredientsMap) {
                const amounts = ingredientsMap[name];
                const shoppingItem = document.createElement('div');
                shoppingItem.className = 'shopping-item';
                shoppingItem.innerHTML = `
                    <span>${name}</span>
                    <span>${amounts.join(' + ')}</span>
                `;
                shoppingList.appendChild(shoppingItem);
            }
        }

        // 分类切换
        categoryBtns.forEach(btn => {
            btn.onclick = () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderRecipes(btn.dataset.type);
            };
        });

        // 底部导航切换
        tabItems.forEach(tab => {
            tab.onclick = () => {
                tabItems.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const page = tab.dataset.page;
                recipePage.style.display = page === 'recipe' ? 'block' : 'none';
                orderPage.style.display = page === 'order' ? 'block' : 'none';
                minePage.style.display = page === 'mine' ? 'block' : 'none';
            };
        });

        // 清空本周计划
        clearAllBtn.onclick = () => {
            if(confirm('确定要清空本周所有计划吗？此操作不可恢复！')) {
                weeklyPlanData = {
                    1: {breakfast: [], lunch: [], dinner: [], snack: []},
                    2: {breakfast: [], lunch: [], dinner: [], snack: []},
                    3: {breakfast: [], lunch: [], dinner: [], snack: []},
                    4: {breakfast: [], lunch: [], dinner: [], snack: []},
                    5: {breakfast: [], lunch: [], dinner: [], snack: []}
                };
                localStorage.setItem('pregnancyWeeklyPlan', JSON.stringify(weeklyPlanData));
                updateOrderBadge();
                renderWeeklyPlan();
                alert('本周计划已清空！');
            }
        };

        // 初始化
        init();
    </script>
</body>
</html>
